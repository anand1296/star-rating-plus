name: CI → Auto Release & Publish

# Run CI on pushes and PRs; the release/publish flow runs when the push is to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write       # needed to push commits/tags and create releases
  packages: write
  id-token: write
  checks: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout (full fetch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library (tsup)
        run: npm run build

      - name: Build CSS (tailwind/node script)
        run: npm run build:css

      - name: Run tests
        run: npm test

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  release-and-publish:
    name: Release & Publish
    needs: build-and-test
    runs-on: ubuntu-latest
    # only run the release/publish job for pushes to main (not PRs)
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout (allow pushing back)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild artifacts
        run: |
          npm run build
          npm run build:css

      - name: Configure git user for CI commits
        run: |
          # set local repo identity so commits created by the workflow have an author
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version, commit and create tag
        id: bump
        run: |
          # Bump strategy: patch (change to minor or major if you prefer)
          # This will:
          #  - update package.json & package-lock.json
          #  - create a commit
          #  - create an annotated tag (e.g. v0.1.2)
          NEW_TAG=$(npm version patch -m "chore(release): %s [skip ci]")
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Push commit and tags back to repo
        run: |
          # push the bump commit and tag(s)
          git push origin HEAD:main
          git push --follow-tags origin main

      - name: Create GitHub Release from tag
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: ${{ steps.bump.outputs.new_tag }}
          body: "Automated release created by workflow."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to npm registry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public

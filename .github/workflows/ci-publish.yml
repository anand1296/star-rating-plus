name: CI → Auto Release & Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  id-token: write
  checks: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout (full fetch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library (tsup)
        run: npm run build

      - name: Build CSS (tailwind/node script)
        run: npm run build:css

      - name: Run tests
        run: npm test

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  release-and-publish:
    name: Release & Publish
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout (allow pushing back)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild artifacts
        run: |
          npm run build
          npm run build:css

      - name: Configure git user for CI commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version, commit and create tag
        id: bump
        run: |
          set -euo pipefail

          # fetch tags to ensure we can detect existing remote tags
          git fetch --tags

          # configure local git user in case not set
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Attempting npm version patch..."
          # Fast path: try normal npm version patch (creates commit + tag)
          if NEW_TAG=$(npm version patch -m "chore(release): %s [skip ci]" 2>&1); then
            echo "Bumped to ${NEW_TAG}"
            echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "npm version failed. Selecting next free patch version..."

          # read current version from package.json
          CUR_VER=$(node -p "require('./package.json').version")
          echo "Current version in package.json: $CUR_VER"

          bump_patch() {
            IFS='.' read -r MAJOR MINOR PATCH <<< "$1"
            PATCH=$((PATCH + 1))
            echo "${MAJOR}.${MINOR}.${PATCH}"
          }

          NEXT_VER=$(bump_patch "$CUR_VER")
          # find a free tag not present remotely
          while git rev-parse "v${NEXT_VER}" >/dev/null 2>&1; do
            echo "Tag v${NEXT_VER} already exists, bumping again..."
            NEXT_VER=$(bump_patch "$NEXT_VER")
          done

          echo "Using next free version: $NEXT_VER"

          # update package.json without creating git tag/commit
          npm version --no-git-tag-version "$NEXT_VER"

          # commit and tag manually
          git add package.json package-lock.json || true
          git commit -m "chore(release): v${NEXT_VER} [skip ci]"
          git tag -a "v${NEXT_VER}" -m "v${NEXT_VER}"

          echo "new_tag=v${NEXT_VER}" >> $GITHUB_OUTPUT
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: actions@github.com

      - name: Push commit and tags back to repo
        run: |
          git push origin HEAD:main
          git push --follow-tags origin main

      - name: Create GitHub Release from tag
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: ${{ steps.bump.outputs.new_tag }}
          body: "Automated release created by workflow."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to npm registry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public

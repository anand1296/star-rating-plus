name: CI → Auto Release & Publish

# Run CI on pushes/PRs; release/publish actions happen only on push to main (merge)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write        # needed to push tags/commits and create releases
  packages: write
  id-token: write
  checks: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout (no fetch tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library (tsup)
        run: npm run build

      - name: Build CSS (tailwind via node script)
        run: npm run build:css

      - name: Run tests
        run: npm test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  release-and-publish:
    name: Release & Publish
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # only run when pushing to main
    steps:
      - name: Checkout (with token to push tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # enable pushing back using GITHUB_TOKEN (persist-credentials true by default in v4)
          persist-credentials: true

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild (ensure artifacts are present)
        run: |
          npm run build
          npm run build:css

      - name: Bump patch version, commit and create tag
        id: bump
        # we use npm version to change package.json, create annotated tag and commit
        run: |
          # choose strategy: patch/minor/major
          NEW_TAG=$(npm version patch -m "chore(release): %s [skip ci]")
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: actions@github.com

      - name: Push commit and tags back to repo
        run: |
          git push origin HEAD:main
          # push tags
          git push --follow-tags origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to npm registry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # ensure correct files are included and publish publicly
          npm publish --access public
